<div class="login-container">

  <div class="login-visual">
    <div class="overlay"></div>
    <img src="back.jfif" alt="Background" class="bg-img">
  </div>

  @if (loginView()) {
  <div class="login-form-side">
    <div class="login-card">
      <img id="logo" src="logo.jfif" alt="Logo">
      <h1 id="title" >VillaBooking</h1>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" formControlName="email" placeholder="ejemplo@correo.com" [class.error]="isFieldInvalid('email', loginForm)">
          @if (isFieldInvalid('email', loginForm)) { <span class="error-msg">Correo inválido</span> }
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="password-field">
            <input [type]="showPassword() ? 'text' : 'password'" id="password" formControlName="password" placeholder="••••••••" [class.error]="isFieldInvalid('password', loginForm)">
            <button type="button" class="btn-show" (click)="togglePassword()">{{ showPassword() ? 'Ocultar' : 'Ver' }}</button>
          </div>
          @if (isFieldInvalid('password', loginForm)) { <span class="error-msg">Mínimo 6 caracteres</span> }
        </div>

        <div class="actions-vertical">
          <button type="submit" class="btn-primary" [disabled]="loginForm.invalid || isLoading()">
            @if (isLoading()) { <span class="spinner"></span> } @else { Entrar }
          </button>

          <button type="button" (click)="toggleView()" class="btn-outline">Registrarme</button>
        </div>
      </form>

      <div class="footer-links">
        <a href="#">¿Olvidaste tu contraseña?</a>
      </div>
    </div>
  </div>
  }

  @if (!loginView()) {
  <div class="login-form-side">
    <div class="login-card">
      @if (ok()) {
      <img id="ok" src="ok.webp" alt="Logo">
      }
      <h3 id="_title" [innerHTML]="notice"></h3>
   <img src="" alt="" srcset="">
      <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" formControlName="name" placeholder="Nombre completo" [class.error]="isFieldInvalid('name', registerForm)">
        </div>

        <div class="form-group">
          <label>Correo Electrónico</label>
          <input type="email" formControlName="email" placeholder="ejemplo@correo.com" [class.error]="isFieldInvalid('email', registerForm)">
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <div class="password-field">
            <input [type]="showPassword() ? 'text' : 'password'" formControlName="password" placeholder="••••••••" [class.error]="isFieldInvalid('password', registerForm)">
          </div>
        </div>

        <div class="form-group">
          <label>Confirmar Contraseña</label>
          <input [type]="showPassword() ? 'text' : 'password'" type="password" formControlName="confirmPassword" placeholder="••••••••" [class.error]="isFieldInvalid('confirmPassword', registerForm)">
          <button type="button" class="btn-show-1" (click)="togglePassword()">{{ showPassword() ? 'Ocultar' : 'Ver' }}</button>
        </div>

        <div class="actions-vertical">
          <button type="button" (click)="onRegister()" class="btn-primary" id="createBtn" [disabled]="registerForm.invalid || isLoading()">
            @if (isLoading()) { <span class="spinner"></span> } @else { Crear Cuenta }
          </button>

          <button type="button" (click)="toggleView()" class="btn-outline">Ya tengo cuenta: Iniciar Sesión</button>
        </div>
      </form>
    </div>
  </div>
  }
</div>
